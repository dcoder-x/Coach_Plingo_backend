$kind: http-request
description: Create new learning path for a language and profession
url: "{{base_url}}/learning/paths"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{access_token}}
body:
  type: text
  content: |-
    {
      "targetLanguage": "es",
      "profession": "software_engineer",
      "proficiencyLevel": "beginner"
    }
order: 1000
