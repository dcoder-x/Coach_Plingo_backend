$kind: http-request
description: Generate AI story content incorporating vocabulary words
url: "{{base_url}}/jobs/generate-story"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "jobId": "job-story-001",
      "payload": {
        "learnerId": "{{learner_id}}",
        "milestoneId": "milestone-123",
        "vocabulary": [
          {
            "word": "software",
            "translation": "software"
          },
          {
            "word": "developer",
            "translation": "desarrollador"
          }
        ],
        "profession": "software_engineer",
        "language": "es"
      }
    }
order: 2000
