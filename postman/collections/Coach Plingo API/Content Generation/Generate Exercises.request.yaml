$kind: http-request
description: Generate AI exercises for vocabulary practice
url: "{{base_url}}/jobs/generate-exercises"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "jobId": "job-exercises-001",
      "payload": {
        "learnerId": "{{learner_id}}",
        "milestoneId": "milestone-123",
        "language": "es",
        "profession": "software_engineer",
        "vocabulary": [
          "software",
          "developer",
          "database"
        ]
      }
    }
order: 3000
