$kind: http-request
description: Request password reset OTP (public endpoint, no auth required). OTP
  will be sent to email/printed to console in dev.
url: "{{base_url}}/auth/forgot-password"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "newuser@example.com"
    }
order: 1000
