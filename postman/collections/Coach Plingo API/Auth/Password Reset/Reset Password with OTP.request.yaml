$kind: http-request
description: Reset password using OTP (public endpoint, no auth required)
url: "{{base_url}}/auth/reset-password"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "newuser@example.com",
      "otp": "123456",
      "newPassword": "NewSecurePass456!"
    }
order: 2000
