$kind: http-request
description: >-
  Verify 2FA setup by submitting OTP received via email. Enables 2FA on the
  account.


  **Request Body**:

  - `otp` (string, required): 6-digit OTP from email (check console.log in dev)


  **Response Example (200)**:

  ```json

  {
    "success": true,
    "data": {
      "twoFactorEnabled": true,
      "method": "email"
    }
  }

  ```


  **Workflow**:

  1. Call POST /auth/2fa/setup to send OTP

  2. Copy OTP from email (or console in dev)

  3. Call this endpoint with the OTP within 10 minutes

  4. 2FA is now active and will be required on next login


  **Error Cases**:

  - 400: Bad request (invalid OTP format or OTP expired)

  - 401: Unauthorized

  - 404: User not found

  - 422: Unprocessable entity (OTP incorrect or mismatch)

  - 500: Failed to enable 2FA
url: "{{base_url}}/auth/2fa/verify"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{access_token}}
body:
  type: text
  content: |-
    {
      "otp": "123456"
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test('2FA setup verification successful', function () {
      pm.expect(pm.response.code).to.eql(200); });

      try {
        const json = pm.response.json();
        if (json?.data?.twoFactorEnabled) pm.collectionVariables.set('2fa_enabled', 'true');
      } catch (error) {
        console.log('Error parsing 2FA response', error);
      }
    language: text/javascript
order: 2000
