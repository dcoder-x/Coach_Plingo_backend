$kind: http-request
description: Record a learning attempt and update word mastery score
url: "{{base_url}}/progress/record-attempt"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{access_token}}
body:
  type: text
  content: |-
    {
      "wordId": "word-uuid-123",
      "learningPathId": "{{learning_path_id}}",
      "attemptType": "pronunciation",
      "isCorrect": true,
      "responseTime": 2500
    }
order: 1000
